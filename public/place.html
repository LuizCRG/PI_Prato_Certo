<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes - Prato Honesto</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container header-content">
            <a href="index.html" class="logo">🍽️ Prato Honesto</a>
            <div class="header-nav">
                <a href="index.html" class="btn btn-outline" style="border-radius: 50%; padding: 10px">←</a>
            </div>
        </div>
    </header>

    <main>
        <!-- Header da Página (Item 7.1) -->
        <div class="place-cover-container">
            <div id="placeCover" class="cover-photo"></div>
            <div class="cover-overlay"></div>
            <a href="index.html" class="back-button">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </a>
        </div>
        
        <div class="container">
            <!-- Card de Informações (Item 7.2) -->
            <div id="placeDetail" class="details-header-card">
                <div class="loading-placeholder">Carregando detalhes do estabelecimento...</div>
            </div>

            <!-- Seção de Avaliações (Item 7.3) -->
            <div class="reviews-layout-grid">
                <!-- Coluna Esquerda: Lista de Avaliações -->
                <div class="reviews-list-column">
                    <h2 id="reviewsCountTitle">Avaliações</h2>
                    <div id="reviewsList">
                        <div class="loading-placeholder">Carregando avaliações...</div>
                    </div>
                </div>

                <!-- Coluna Direita: Formulário ou CTA -->
                <div class="reviews-sidebar-column">
                    <div id="reviewFormContainer">
                        <!-- Conteúdo gerado dinamicamente pelo JS -->
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/supabase-client.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
