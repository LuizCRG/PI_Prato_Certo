<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Prato Honesto</title>
    <link rel="stylesheet" href="./css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; }
        .auth-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
        .auth-container { width: 100%; max-width: 480px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 48px 40px; box-shadow: 0 8px 40px rgba(0,0,0,0.12); }
        .auth-logo { text-align: center; margin-bottom: 28px; }
        .auth-logo .emoji { font-size: 2.8rem; display: block; margin-bottom: 8px; }
        .auth-logo h1 { font-size: 1.5rem; margin: 0 0 4px; }
        .auth-logo p { color: var(--muted-foreground); font-size: .9rem; margin: 0; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 7px; font-weight: 600; font-size: .88rem; }
        .form-control { width: 100%; padding: 13px 16px; border: 1.5px solid var(--border); border-radius: 10px; background: var(--background); color: var(--foreground); font-family: inherit; font-size: .95rem; transition: border-color .2s, box-shadow .2s; box-sizing: border-box; }
        .form-control:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(230,126,34,.15); }
        .role-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
        .role-card { border: 1.5px solid var(--border); padding: 16px 12px; border-radius: 12px; text-align: center; cursor: pointer; transition: .2s; }
        .role-card:hover, .role-card.active { border-color: var(--primary); background: rgba(230,126,34,.06); }
        .role-card .rc-icon { font-size: 2rem; display: block; margin-bottom: 8px; }
        .role-card .rc-title { font-weight: 700; font-size: .95rem; }
        .role-card .rc-desc { font-size: .75rem; color: var(--muted-foreground); margin-top: 4px; }
        .btn-auth { width: 100%; padding: 15px; margin-top: 8px; font-size: 1rem; font-weight: 700; border-radius: 10px; }
        .auth-footer { text-align: center; margin-top: 24px; font-size: .9rem; color: var(--muted-foreground); }
        .auth-footer a { color: var(--primary); font-weight: 600; text-decoration: none; }
        .error-msg { background: #fce8e6; color: #c5221f; border-radius: 8px; padding: 12px 16px; font-size: .88rem; margin-bottom: 16px; display: none; }
        .success-msg { background: #e6f4ea; color: #1e8e3e; border-radius: 8px; padding: 12px 16px; font-size: .88rem; margin-bottom: 16px; display: none; }
    </style>
</head>
<body>
    <header>
        <div class="container header-content">
            <a href="index.html" class="logo">🍽️ <span>Prato Honesto</span></a>
        </div>
    </header>
    <div class="auth-wrap">
        <div class="auth-container">
            <div class="auth-logo">
                <span class="emoji">🎉</span>
                <h1>Criar sua conta</h1>
                <p>Junte-se à comunidade de comedores honestos</p>
            </div>

            <p style="font-size:.85rem;font-weight:600;margin-bottom:10px;color:var(--muted-foreground)">Tipo de conta:</p>
            <div class="role-grid">
                <div class="role-card active" data-role="consumer" id="cardConsumer">
                    <span class="rc-icon">👤</span>
                    <div class="rc-title">Consumidor</div>
                    <div class="rc-desc">Quero descobrir e avaliar</div>
                </div>
                <div class="role-card" data-role="business" id="cardBusiness">
                    <span class="rc-icon">🏪</span>
                    <div class="rc-title">Estabelecimento</div>
                    <div class="rc-desc">Quero gerenciar meu negócio</div>
                </div>
            </div>

            <div id="errorMsg" class="error-msg"></div>
            <div id="successMsg" class="success-msg"></div>

            <form id="signupForm">
                <div class="form-group">
                    <label for="signupName">Nome Completo</label>
                    <input type="text" id="signupName" class="form-control" placeholder="Ex: Maria Souza" required>
                </div>
                <div class="form-group">
                    <label for="signupEmail">E-mail</label>
                    <input type="email" id="signupEmail" class="form-control" placeholder="seu@email.com" required>
                </div>
                <div class="form-group">
                    <label for="signupPassword">Senha <span style="color:var(--muted-foreground);font-weight:400">(mínimo 6 caracteres)</span></label>
                    <input type="password" id="signupPassword" class="form-control" placeholder="••••••••" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary btn-auth" id="submitBtn">Criar minha conta</button>
            </form>
            <div class="auth-footer">
                Já tem conta? <a href="login.html">Fazer login</a>
            </div>
        </div>
    </div>
    <script>
        if (localStorage.getItem('prato_honesto_session')) {
            window.location.href = 'index.html';
        }

        let selectedRole = 'consumer';
        document.getElementById('cardConsumer').addEventListener('click', () => {
            selectedRole = 'consumer';
            document.getElementById('cardConsumer').classList.add('active');
            document.getElementById('cardBusiness').classList.remove('active');
        });
        document.getElementById('cardBusiness').addEventListener('click', () => {
            selectedRole = 'business';
            document.getElementById('cardBusiness').classList.add('active');
            document.getElementById('cardConsumer').classList.remove('active');
        });

        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const errEl = document.getElementById('errorMsg');
            const sucEl = document.getElementById('successMsg');
            errEl.style.display = 'none';
            sucEl.style.display = 'none';
            btn.textContent = 'Criando conta...';
            btn.disabled = true;

            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, role: selectedRole })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Erro ao criar conta.');

                // Auto-login após registro
                const loginRes = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const loginData = await loginRes.json();

                if (loginRes.ok && loginData.session) {
                    localStorage.setItem('prato_honesto_session', JSON.stringify({
                        access_token: loginData.session.access_token,
                        user: loginData.user
                    }));
                    sucEl.textContent = '🎉 Conta criada! Redirecionando...';
                    sucEl.style.display = 'block';
                    setTimeout(() => { window.location.href = 'index.html'; }, 1200);
                } else {
                    sucEl.textContent = '✅ Conta criada! Faça login para continuar.';
                    sucEl.style.display = 'block';
                    setTimeout(() => { window.location.href = 'login.html'; }, 1500);
                }
            } catch (err) {
                errEl.textContent = err.message;
                errEl.style.display = 'block';
                btn.textContent = 'Criar minha conta';
                btn.disabled = false;
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/supabase-client.js"></script>
</body>
</html>
