<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - Prato Honesto</title>
    <link rel="stylesheet" href="./css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; }
        .auth-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
        .auth-container { width: 100%; max-width: 420px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 48px 40px; box-shadow: 0 8px 40px rgba(0,0,0,0.12); }
        .auth-logo { text-align: center; margin-bottom: 32px; }
        .auth-logo .emoji { font-size: 3rem; display: block; margin-bottom: 8px; }
        .auth-logo h1 { font-size: 1.6rem; margin: 0 0 4px; }
        .auth-logo p { color: var(--muted-foreground); font-size: .9rem; margin: 0; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: .88rem; color: var(--foreground); }
        .form-control { width: 100%; padding: 13px 16px; border: 1.5px solid var(--border); border-radius: 10px; background: var(--background); color: var(--foreground); font-family: inherit; font-size: .95rem; transition: border-color .2s, box-shadow .2s; box-sizing: border-box; }
        .form-control:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(230,126,34,.15); }
        .btn-auth { width: 100%; padding: 15px; margin-top: 8px; font-size: 1rem; font-weight: 700; border-radius: 10px; }
        .auth-footer { text-align: center; margin-top: 28px; font-size: .9rem; color: var(--muted-foreground); }
        .auth-footer a { color: var(--primary); font-weight: 600; text-decoration: none; }
        .error-msg { background: #fce8e6; color: #c5221f; border-radius: 8px; padding: 12px 16px; font-size: .88rem; margin-bottom: 16px; display: none; }
    </style>
</head>
<body>
    <header>
        <div class="container header-content">
            <a href="index.html" class="logo">🍽️ <span>Prato Honesto</span></a>
        </div>
    </header>
    <div class="auth-wrap">
        <div class="auth-container">
            <div class="auth-logo">
                <span class="emoji">👋</span>
                <h1>Bem-vindo de volta!</h1>
                <p>Entre para avaliar os melhores pratos</p>
            </div>
            <div id="errorMsg" class="error-msg"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" class="form-control" placeholder="seu@email.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary btn-auth" id="submitBtn">Entrar</button>
            </form>
            <div class="auth-footer">
                Não tem conta? <a href="signup.html">Criar conta grátis</a>
            </div>
        </div>
    </div>
    <script>
        // Redirect if already logged in
        if (localStorage.getItem('prato_honesto_session')) {
            window.location.href = 'index.html';
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const errEl = document.getElementById('errorMsg');
            errEl.style.display = 'none';
            btn.textContent = 'Entrando...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Credenciais inválidas.');

                // Save session
                if (data.session) {
                    localStorage.setItem('prato_honesto_session', JSON.stringify({
                        access_token: data.session.access_token,
                        user: data.user
                    }));
                    window.location.href = 'index.html';
                } else {
                    throw new Error('Sessão não iniciada. Verifique se seu e-mail foi confirmado.');
                }
            } catch (err) {
                errEl.textContent = err.message;
                errEl.style.display = 'block';
                btn.textContent = 'Entrar';
                btn.disabled = false;
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/supabase-client.js"></script>
</body>
</html>
